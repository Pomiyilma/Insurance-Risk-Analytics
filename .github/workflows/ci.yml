name: CI Pipeline

on:
  push:
    branches:
      - main
      - task-1

  pull_request:
      branches:
        - main

jobs:
  test:

    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: 3.11

    - name: Install dependencies
      run: |
        pip install -r requirements.txt

    - name: Run flake8
      run: |
        flake8 src

    - name: Run tests
      run: |
        pytest